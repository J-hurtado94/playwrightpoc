# Node.js
# Build a general Node.js project with npm.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
- none

pool:
  vmImage: ubuntu-latest


stages:
# 1) Smoke tests — rápidos para validar salud básica
- stage: smoke_tests
  displayName: 'Smoke Tests'
  jobs:
  - job: smoke
    displayName: 'Run Smoke Tests'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '24.x'
      displayName: 'Install Node.js'
    - script: npm ci
      displayName: 'npm ci'
    - script: npx playwright install --with-deps
      displayName: 'Install Playwright browsers'
    - script: npx playwright test --grep "@smoke"
      displayName: 'Run Smoke Tests'
      env:
        CI: 'true'

# 2) E2E tests — pruebas end-to-end completas
- stage: e2e_tests
  displayName: 'E2E Tests'
  dependsOn: smoke_tests
  condition: succeeded() # explícito, pero es el default
  jobs:
  - job: e2e
    displayName: 'Run E2E Tests'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        version: '24.x'
      displayName: 'Install Node.js'
    - script: npm ci
      displayName: 'npm ci'
    - script: npx playwright install --with-deps
      displayName: 'Install Playwright browsers'
    - script: npx playwright test --grep "@e2e"
      displayName: 'Run E2E Tests'
      env:
        CI: 'true'
